<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=600, height=600, initial-scale=1.0, user-scalable=no" />
  <meta name="description" content="wiser — steer a fleet of Claude agents from smart glasses" />
  <meta name="mrbd-web-app-capable" content="yes" />
  <title>wiser</title>
  <link rel="icon" type="image/svg+xml" href="favicon.svg" />
  <link rel="manifest" href="manifest.webmanifest" />
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Quicksand:wght@400;500;600;700&family=Spline+Sans+Mono:wght@400;500;600&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="styles.css" />
</head>
<body>
  <!-- 600×600 glasses surface — the ONLY screen. No companion, no dashboard. -->
  <div id="stage">
    <div id="app" class="surface">

      <!-- ─────────── HOME: Sessions overview + Mission-Control glance (root) ─────────── -->
      <div id="home" class="home hidden"><!-- built by app.js --></div>

      <!-- ─────────── TEAM: MetaLoop zoom-out — the fan-out racing the goal ─────────── -->
      <div id="team" class="goals hidden">
        <div class="detail-head">
          <button class="back-btn focusable" data-action="team-back" tabindex="0">↓</button>
          <span id="team-title">Team</span>
        </div>
        <div id="team-body" class="goals-body"></div>
      </div>

      <!-- ─────────── ANALYTICS: fleet cost × quality + evaluations (glanceable) ─────────── -->
      <div id="analytics" class="goals hidden">
        <div class="detail-head">
          <button class="back-btn focusable" data-action="analytics-back" tabindex="0">←</button>
          <span>Cost × Quality</span>
        </div>
        <div id="analytics-body" class="goals-body"></div>
      </div>

      <!-- ─────────── GOALS: per-session goal progression / steps ─────────── -->
      <div id="goals" class="goals hidden">
        <div class="detail-head">
          <button class="back-btn focusable" data-action="goals-back" tabindex="0">←</button>
          <span id="goals-task">Goal</span>
        </div>
        <div id="goals-body" class="goals-body"></div>
      </div>

      <!-- ─────────── AMBIENT: calm by default. Just the target + progress. ─────────── -->
      <div id="ambient" class="ambient hidden">
        <div class="task-row">
          <span id="task-name" class="task-name">—</span>
          <span id="iter" class="iter"></span>
        </div>
        <div class="goal-block">
          <div class="goal-tag">GOAL</div>
          <div id="goal-label" class="goal-label">ready</div>
          <div class="bar"><div id="bar-fill" class="bar-fill"></div></div>
          <div id="goal-count" class="goal-count"></div>
        </div>
      </div>

      <!-- ─────────── DECISION: takes the center ONLY when the agent needs you ─────────── -->
      <div id="decision" class="decision hidden"></div>

      <!-- ─────────── STATUSLINE: always on. The rolling present-tense. ─────────── -->
      <div id="statusline" class="statusline hidden">
        <span id="sl-status" class="sl-status"><i class="dot"></i></span>
        <span id="sl-act" class="sl-act">idle</span>
        <span id="sl-note" class="sl-note"></span>
        <span id="sl-cost" class="sl-cost">$0.00</span>
      </div>
      <div id="hint" class="hint"></div>

      <!-- ─────────── DEEP-DIVE: the only list, pulled on demand (activity trail) ─────────── -->
      <div id="detail" class="detail hidden">
        <div class="detail-head">
          <button class="back-btn focusable" data-action="back" tabindex="0">←</button>
          <span>Activity</span>
        </div>
        <div id="detail-body" class="detail-body"></div>
      </div>

      <!-- ─────────── VOICE steer ─────────── -->
      <div id="voice" class="voice hidden">
        <div class="waves">
          <svg viewBox="0 0 200 120" preserveAspectRatio="none" aria-hidden="true">
            <defs>
              <linearGradient id="wg" x1="0" y1="0" x2="1" y2="0">
                <stop offset="0" stop-color="#d97757" stop-opacity="0" />
                <stop offset="0.5" stop-color="#d97757" />
                <stop offset="1" stop-color="#cc9b7a" stop-opacity="0" />
              </linearGradient>
            </defs>
            <path class="w w1" d="M-50 60 Q-25 30 0 60 T50 60 T100 60 T150 60 T200 60 T250 60" />
            <path class="w w2" d="M-50 60 Q-25 80 0 60 T50 60 T100 60 T150 60 T200 60 T250 60" />
            <path class="w w3" d="M-50 60 Q-25 42 0 60 T50 60 T100 60 T150 60 T200 60 T250 60" />
          </svg>
        </div>
        <div id="voice-label" class="voice-label">Listening…</div>
        <div id="voice-text" class="voice-text"></div>
        <div class="voice-hint"><kbd>⏎</kbd> accept · <kbd>⎋</kbd> skip</div>
      </div>

      <!-- ─────────── START (idle — legacy; home is the root now) ─────────── -->
      <div id="start" class="start hidden">
        <div class="start-mark">wiser</div>
        <div class="start-sub">steer the fleet, hands-free</div>
        <button class="start-btn focusable" data-action="start" tabindex="0">⏎ start the loop</button>
      </div>

    </div>

    <div id="stage-foot" class="stage-foot">glasses · <span id="mode-badge">demo</span></div>
  </div>

  <script src="config.js"></script>
  <script src="contract.js"></script>
  <script src="cards.js"></script>
  <script src="mock.js"></script>
  <script src="mock-fleet.js"></script>
  <script src="session.js"></script>
  <script src="app.js"></script>
</body>
</html>
