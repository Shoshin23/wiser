<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=600, height=600, initial-scale=1.0, user-scalable=no" />
  <meta name="description" content="wiser — voice-driven Claude agents on Ray-Ban Display glasses" />
  <meta name="mrbd-web-app-capable" content="yes" />
  <title>wiser</title>
  <link rel="icon" type="image/svg+xml" href="favicon.svg" />
  <link rel="manifest" href="manifest.webmanifest" />
  <link rel="stylesheet" href="styles.css" />
</head>
<body>
  <div id="app">
    <!-- HOME -->
    <div id="home" class="screen">
      <header class="header">
        <h1>wiser</h1>
        <span class="header-meta" id="status">Ready</span>
      </header>

      <div class="content" id="home-content">
        <div id="hint" class="hint">Focus <b>Ask</b> and press the D-pad button to speak.</div>

        <div id="card-slot"><!-- result card injected here --></div>

        <div id="text-row" class="text-row hidden">
          <input id="text-input" class="text-input focusable" type="text"
                 placeholder="Type a prompt…" tabindex="0" />
          <button class="nav-item primary focusable" data-action="send-text">Send</button>
        </div>
      </div>

      <nav class="nav-bar">
        <button class="nav-item primary focusable" data-action="ask">Ask</button>
        <button class="nav-item focusable" data-action="ask-image">Ask + Image</button>
        <button class="nav-item focusable" data-action="toggle-text">Type</button>
      </nav>
    </div>

    <!-- DETAIL -->
    <div id="detail" class="screen hidden">
      <header class="header">
        <button class="back-btn focusable" data-action="back" tabindex="0">&#8592;</button>
        <h1 id="detail-title">Result</h1>
      </header>
      <div class="content">
        <div id="detail-transcript" class="detail-transcript"></div>
        <div id="detail-answer" class="detail-answer"></div>
      </div>
      <nav class="nav-bar">
        <button class="nav-item focusable" data-action="replay">Replay</button>
        <button class="nav-item focusable" data-action="back">Back</button>
      </nav>
    </div>

    <!-- overlays -->
    <div id="loading" class="overlay hidden">
      <div class="spinner"></div>
      <div class="overlay-text" id="loading-text">Thinking…</div>
    </div>
    <div id="error" class="overlay hidden">
      <div class="overlay-icon">&#9888;</div>
      <div class="overlay-text" id="error-text">Something went wrong</div>
      <button class="nav-item focusable" data-action="dismiss-error">OK</button>
    </div>
  </div>

  <!-- hidden capture elements -->
  <video id="cam" playsinline muted style="display:none"></video>
  <canvas id="frame" width="640" height="640" style="display:none"></canvas>

  <script src="config.js"></script>
  <script src="app.js"></script>
</body>
</html>
